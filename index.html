<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="tanjiro.png" alt="Tanjiro" class="gambar-atas">
        
        <div class="form-box">
            <div class="input-group">
                <label for="nama">Nama</label>
                <input type="text" id="nama" placeholder="Masukkan nama kamu">
            </div>
            
            <div class="input-group">
                <label for="prodi">Program Studi</label>
                <input type="text" id="prodi" placeholder="Masukkan program studi">
            </div>
            
            <div class="input-group">
                <label for="semester">Semester</label>
                <input type="number" id="semester" placeholder="Masukkan semester (angka)">
            </div>

            <div class="button-group">
                <button id="btn-lanjut" class="btn merah">Lanjut</button>
                <button id="btn-keluar" class="btn hitam">Keluar</button>
            </div>
        </div>
    </div>

    <script src="function.js"></script>
</body>
</html>
